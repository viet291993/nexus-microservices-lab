spring:
  application:
    name: order-service
  config:
    import: "configserver:${CONFIG_SERVER_URL:http://config-server:8888/}"
  cloud:
    config:
      # Bật fail-fast để service dừng lại và thử lại nếu không thấy Config Server (giúp Docker Swarm restart container)
      fail-fast: true
      retry:
        initial-interval: 2000
        max-interval: 10000
        max-attempts: 6
      username: ${NEXUS_USERNAME:nexus_admin}
      password: ${CONFIG_SERVER_PASSWORD:dev_password}
    function:
      definition: process-inventory-response
    stream:
      bindings:
        # Binding cho hàm consume (đã tạo với bean name là process-inventory-response)
        process-inventory-response-in-0:
          destination: inventory-events-topic
          group: order-service-group

        # Binding cho lệnh gửi event (trong Producer sinh ra)
        send-order-events-out-0:
          destination: order-events-topic
