asyncapi: "2.6.0"
id: "urn:nexus:microservices:saga-event-contracts"
defaultContentType: "application/json"
tags:
  - name: "saga"
  - name: "kafka"
info:
  title: Nexus Microservices - Saga Event Contracts
  version: "1.0.0"
  description: >
    Bản thiết kế Shared Event Schema (Source of Truth) dùng cho Order Service (Java) 
    và Inventory Service (NestJS) trong kiến trúc Saga Choreography.
  contact:
    name: Nexus Team
    url: "https://github.com/viet291993/nexus-microservices-lab"
    email: contact@nexus.local
  license:
    name: Apache 2.0
    url: "https://www.apache.org/licenses/LICENSE-2.0"

servers:
  local-kafka:
    url: localhost:9092
    protocol: kafka
    description: Local Kafka broker running via Docker Compose

channels:
  saga-orders-topic:
    description: Topic dành cho các sự kiện xuất phát từ luồng Đơn hàng (Order)
    subscribe:
      summary: Inventory Service lắng nghe topic này để trừ kho.
      operationId: processOrderEvents
      message:
        $ref: "#/components/messages/OrderCreatedSubscribe"

    publish:
      summary: Order Service gửi sự kiện tạo đơn hàng vào topic này.
      operationId: sendOrderEvents
      message:
        $ref: "#/components/messages/OrderCreatedPublish"

  saga-inventory-response:
    description: Topic dành cho kết quả xử lý kho (Inventory Response)
    subscribe:
      summary: Order Service lắng nghe topic này để cập nhật trạng thái đơn (Thành công/Thất bại).
      operationId: processInventoryResponses
      message:
        oneOf:
          - $ref: "#/components/messages/InventoryConfirmedSubscribe"
          - $ref: "#/components/messages/InventoryFailedSubscribe"

    publish:
      summary: Inventory Service trả kết quả về topic này sau khi xử lý trừ kho.
      operationId: sendInventoryResponses
      message:
        oneOf:
          - $ref: "#/components/messages/InventoryConfirmedPublish"
          - $ref: "#/components/messages/InventoryFailedPublish"

components:
  messages:
    OrderCreatedPublish:
      messageId: OrderCreatedPublishId
      name: OrderCreated
      title: Sự kiện Khởi tạo Đơn hàng (Output)
      summary: Được kích hoạt khi Order Service nhận một request đặt hàng hợp lệ. Trạng thái PENDING.
      payload:
        $ref: "#/components/schemas/OrderEventPayload"

    OrderCreatedSubscribe:
      messageId: OrderCreatedSubscribeId
      name: OrderCreated
      title: Sự kiện Khởi tạo Đơn hàng (Input)
      summary: Inventory Service đọc sự kiện này để tiến hành trừ kho.
      payload:
        $ref: "#/components/schemas/OrderEventPayload"

    InventoryConfirmedPublish:
      messageId: InventoryConfirmedPublishId
      name: InventoryConfirmed
      title: Sự kiện Trừ kho Thành công (Output)
      summary: Được Inventory Service gửi đi khi kho đủ số lượng. Trạng thái CONFIRMED.
      payload:
        $ref: "#/components/schemas/OrderEventPayload"

    InventoryConfirmedSubscribe:
      messageId: InventoryConfirmedSubscribeId
      name: InventoryConfirmed
      title: Sự kiện Trừ kho Thành công (Input)
      summary: Order Service đọc sự kiện này để chốt đơn thành công.
      payload:
        $ref: "#/components/schemas/OrderEventPayload"

    InventoryFailedPublish:
      messageId: InventoryFailedPublishId
      name: InventoryFailed
      title: Sự kiện Trừ kho Thất bại (Output)
      summary: Được Inventory Service gửi đi khi kho không đủ hoặc lỗi. Trạng thái CANCELLED/FAILED.
      payload:
        $ref: "#/components/schemas/OrderEventPayload"

    InventoryFailedSubscribe:
      messageId: InventoryFailedSubscribeId
      name: InventoryFailed
      title: Sự kiện Trừ kho Thất bại (Input)
      summary: Order Service đọc sự kiện này để tiến hành Rollback.
      payload:
        $ref: "#/components/schemas/OrderEventPayload"

  schemas:
    OrderEventPayload:
      type: object
      description: Cấu trúc dữ liệu chuẩn của Event (DTO) dùng chung cho cả Order và Inventory.
      required:
        - orderId
        - productId
        - quantity
        - eventType
      properties:
        orderId:
          type: string
          description: Mã định danh duy nhất của Đơn hàng (UUID)
          example: "123e4567-e89b-12d3-a456-426614174000"
        productId:
          type: string
          description: Mã định danh của Sản phẩm
          example: "PROD-001"
        quantity:
          type: integer
          description: Số lượng sản phẩm cần đặt hoặc trừ kho
          minimum: 1
          example: 5
        status:
          type: string
          description: Trạng thái của đơn hàng trong hệ thống (Dùng để update database)
          enum: [PENDING, CONFIRMED, CANCELLED, FAILED]
          example: "PENDING"
        eventType:
          type: string
          description: Dấu hiệu nhận biết loại Event để Consumer chuyển hướng xử lý (Routing)
          enum: [ORDER_CREATED, INVENTORY_CONFIRMED, INVENTORY_FAILED]
          example: "ORDER_CREATED"
