# .coderabbit.yaml
# Chỉnh sửa dựa trên schema: https://www.coderabbit.ai/integrations/schema.v2.json

language: "vi-VN"

tone_instructions: |
  Hãy luôn phản hồi bằng tiếng Việt.
  Sử dụng phong cách trình bày chuyên nghiệp nhưng thân thiện, kết hợp các emoji và cấu trúc checklist (ví dụ: - [ ] hoặc - [x]).

reviews:
  profile: "assertive"
  high_level_summary_instructions: |
    Viết báo cáo tóm tắt bằng tiếng Việt.
    Sử dụng các icon và định dạng tiêu đề (Header) rõ ràng.
    Nếu có thể, hãy trình bày các bước dưới dạng roadmap hoặc checklist.

issue_enrichment:
  auto_enrich:
    enabled: true
  planning:
    enabled: true
    auto_planning:
      enabled: true
      labels:
        - "plan-me"
        - "feature"
        - "!no-plan"
