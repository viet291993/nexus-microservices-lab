name: Nexus CD (Continuous Deployment)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: # Cho phép chạy thủ công

env:
  REGISTRY: ghcr.io
  # Prefix cho đặt tên image trên GitHub Container Registry
  IMAGE_NAME_PREFIX: ${{ github.repository_owner }}/nexus

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            context: .
            dockerfile: api-gateway/Dockerfile
            image: nexus-api-gateway
          - service: eureka-server
            context: .
            dockerfile: eureka-server/Dockerfile
            image: nexus-eureka-server
          - service: config-server
            context: .
            dockerfile: config-server/Dockerfile
            image: nexus-config-server
          - service: order-service
            context: .
            dockerfile: services/order-service/Dockerfile
            image: nexus-order-service
          - service: product-service
            context: .
            dockerfile: services/product-service/Dockerfile
            image: nexus-product-service
          - service: inventory-service
            context: .
            dockerfile: services/inventory-service/Dockerfile
            image: nexus-inventory-service

    steps:
      # Pin Action bằng commit SHA thay vì tag để chống tấn công supply-chain (Security Hardening)
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          driver: docker-container

      - name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Trích xuất metadata như tag, label để gắn vào image một cách nhất quán
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

  deploy-swarm:
    needs: build-and-push
    # Chạy khi push vào main HOẶC khi trigger thủ công (workflow_dispatch)
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production-swarm
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate stack file
        run: docker stack config -c infra/docker-stack.yml > /dev/null

      - name: Deploy to Docker Swarm via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          envs: GITHUB_REPOSITORY_OWNER,GITHUB_SHA
          script: |
            # 1. Export biến tag để docker-stack.yml nhận diện (sử dụng 7 ký tự đầu của SHA)
            export IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)
            export GITHUB_REPOSITORY_OWNER=$GITHUB_REPOSITORY_OWNER
            
            # 2. Load các secrets môi trường đã chuẩn bị sẵn trên server
            if [ -f ~/.env_nexus ]; then
              export $(grep -v '^#' ~/.env_nexus | xargs)
            fi

            # 3. Thực hiện deploy (Cập nhật Rolling Update)
            # --with-registry-auth giúp Manager node lấy quyền push/pull từ GHCR
            docker stack deploy -c infra/docker-stack.yml nexus-microservices --with-registry-auth --prune
            
            # 4. Kiểm tra trạng thái sơ bộ
            docker stack services nexus-microservices
