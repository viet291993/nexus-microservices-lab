name: Nexus CD (Continuous Deployment)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: # Cho phép chạy thủ công

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: ${{ github.repository_owner }}/nexus

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            context: .
            dockerfile: api-gateway/Dockerfile
            image: nexus-api-gateway
          - service: eureka-server
            context: .
            dockerfile: eureka-server/Dockerfile
            image: nexus-eureka-server
          - service: config-server
            context: .
            dockerfile: config-server/Dockerfile
            image: nexus-config-server
          - service: order-service
            context: .
            dockerfile: services/order-service/Dockerfile
            image: nexus-order-service
          - service: product-service
            context: .
            dockerfile: services/product-service/Dockerfile
            image: nexus-product-service
          - service: inventory-service
            context: .
            dockerfile: services/inventory-service/Dockerfile
            image: nexus-inventory-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-swarm:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Deployment Files
        run: |
          echo "Dumping deployment configuration for Docker Swarm..."
          # Trong thực tế, bước này sẽ SSH vào server và chạy lệnh deploy.
          # Ở đây chúng ta chỉ mô phỏng việc kiểm tra file cấu hình.
          ls -R infra/
