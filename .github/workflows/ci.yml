# Nexus CI Workflow

# Tên workflow hiển thị trên GitHub Actions
name: Nexus CI

# Quy tắc kích hoạt workflow
on:
  push:
    branches: [ main ] # Chạy khi push code vào nhánh main
  pull_request:
    branches: [ main ] # Chạy khi tạo hoặc cập nhật Pull Request vào nhánh main

jobs:
  # Job 1: Build và kiểm tra các dự án Java (Maven)
  build-maven:
    name: Build Maven Projects
    runs-on: ubuntu-latest # Sử dụng runner chạy trên hệ điều hành Ubuntu mới nhất
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Bước clone mã nguồn về runner

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # Cài đặt Java Development Kit
        with:
          java-version: '17'
          distribution: 'temurin' # Sử dụng bản phân phối Temurin (phổ biến và ổn định)
          cache: 'maven' # Tự động lưu cache các thư viện Maven để tăng tốc độ build

      - name: Build with Maven
        # Chạy lệnh Maven verify nhưng bỏ qua các bài test để kiểm tra cấu hình pom.xml và build cơ bản
        # -B: Batch mode (không log quá nhiều chi tiết)
        run: mvn -B verify -DskipTests

  # Job 2: Build và kiểm tra dự án Node.js (inventory-service)
  build-node:
    name: Build Inventory Service (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/inventory-service # Chỉ định thư mục làm việc cho các lệnh tiếp theo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4 # Cài đặt môi trường Node.js
        with:
          node-version: '24'
          cache: 'npm' # Lưu cache node_modules
          cache-dependency-path: services/inventory-service/package-lock.json

      - name: Install Dependencies
        run: npm ci # Lệnh cài đặt dependency sạch (dựa trên package-lock.json)

      - name: Run Tests
        run: npm test # Chạy bộ unit test của project

      - name: Build Project
        run: npm run build # Chạy lệnh build để kiểm tra biên dịch TypeScript

  # Job 3: Kiểm tra cấu hình Docker Compose trong thư mục infra
  validate-docker:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create dummy .env for validation
        # Lệnh này sẽ copy file mẫu thành file .env thật để docker-compose có thể đọc được các biến (interpolation)
        run: cp infra/.env.example infra/.env

      - name: Check Docker Compose Config
        # Sử dụng docker compose config để kiểm tra cú pháp file yaml mà không cần chạy các container thực tế
        run: docker compose -f infra/docker-compose.yml config
