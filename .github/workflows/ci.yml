name: Continuous Integration

# Cấu hình các điều kiện kích hoạt workflow
on:
  pull_request:
    branches: [main] # Chạy khi có Pull Request vào nhánh main
  push:
    branches: [main] # Chạy khi có code được push trực tiếp lên nhánh main

jobs:
  # Job 1: Kiểm tra build cho các dịch vụ Java (Maven)
  build-maven:
    name: Build Maven Projects
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Lấy mã nguồn từ repository

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # Cài đặt môi trường Java 17
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven' # Lưu cache các thư viện Maven để tăng tốc cho lần chạy sau

      - name: Build and Verify with Maven
        run: mvn -B verify -DskipTests # Biên dịch và kiểm tra cấu hình toàn bộ dự án Java

  # Job 2: Kiểm tra build và test cho dịch vụ Node.js (Inventory Service)
  build-node:
    name: Build and Test Node.js (Inventory Service)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/inventory-service # Chỉ định thư mục làm việc cho các lệnh tiếp theo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4 # Cài đặt môi trường Node.js
        with:
          node-version: '20'
          cache: 'npm' # Lưu cache node_modules
          cache-dependency-path: services/inventory-service/package-lock.json

      - name: Install dependencies
        run: npm ci # Cài đặt các thư viện Node.js một cách sạch sẽ

      - name: Run Tests
        run: npm test # Chạy các unit test của NestJS

      - name: Build project
        run: npm run build # Đảm bảo code có thể build thành công ra thư mục dist/

  # Job 3: Kiểm tra tính hợp lệ của cấu hình Docker
  validate-docker:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra # Chuyển vào thư mục chứa cấu hình hạ tầng
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create dummy .env for validation
        # Copy file mẫu sang .env để Docker Compose có đủ các biến môi trường cần thiết khi kiểm tra
        run: cp .env.example .env

      - name: Validate Docker Compose File
        run: docker compose config # Kiểm tra cú pháp và cấu trúc file docker-compose.yml
