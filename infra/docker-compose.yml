# version: '3.8' # Phiên bản cú pháp Docker Compose. 3.8 là chuẩn phổ biến và ổn định hiện nay.

services:
  # ==========================================
  # 1. DATABASE QUAN HỆ (RDBMS) - POSTGRESQL
  # ==========================================
  # Mục đích: Lưu trữ dữ liệu cần tính toàn vẹn cao, có quan hệ chặt chẽ (ACID).
  # Ứng dụng trong Nexus: Order Service (Đơn hàng), User Service (Người dùng).
  postgres:
    image: postgres:15-alpine # Dùng bản Alpine siêu nhẹ, tiết kiệm RAM cho máy tính.
    container_name: nexus-postgres # Đặt tên container cố định để dễ nhìn khi gõ lệnh 'docker ps'.
    command: ["postgres", "-c", "wal_level=logical"] # BẬT CDC: Bắt buộc để Debezium đọc được log vật lý (WAL).
    ports:
      - "5432:5432" # Map port: [Port ở máy thật (để dùng DBeaver kết nối)] : [Port nội bộ của container]
    environment:
      POSTGRES_USER: nexus_user # User mặc định được tạo khi DB khởi chạy lần đầu.
      POSTGRES_PASSWORD: nexus_password # Password (sẽ dùng để config trong Spring Boot/NestJS).
      POSTGRES_DB: nexus_db # Tên database tự động được tạo sẵn.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 256mb
    restart: unless-stopped

  # ==========================================
  # 2. DATABASE NoSQL - MONGODB
  # ==========================================
  # Mục đích: Lưu trữ dữ liệu phi cấu trúc, linh hoạt, tốc độ đọc/ghi cao.
  # Ứng dụng trong Nexus: Product Catalog (Danh mục sản phẩm đa dạng thuộc tính), Inventory.
  mongodb:
    image: mongo:6.0 # Dùng bản 6.0 vì nó ổn định và tương thích tốt với các driver mới của Java/NodeJS.
    container_name: nexus-mongodb
    ports:
      - "27017:27017" # Port giao tiếp chuẩn của MongoDB.
    environment:
      MONGO_INITDB_ROOT_USERNAME: root # Tài khoản quản trị cấp cao nhất (Root).
      MONGO_INITDB_ROOT_PASSWORD: rootpassword # Mật khẩu quản trị.
    volumes:
      - mongodb_data:/data/db
    mem_limit: 384mb
    restart: unless-stopped

  # ==========================================
  # 3. CACHING LAYER - REDIS
  # ==========================================
  # Mục đích: Cache kết quả query, quản lý Session phân tán, làm Rate Limiting cho API Gateway.
  redis:
    image: redis:7-alpine # Bản Alpine siêu gọn nhẹ.
    container_name: nexus-redis
    ports:
      - "6379:6379" # Port chuẩn của Redis.
    volumes:
      - redis_data:/data
    mem_limit: 128mb
    restart: unless-stopped

  # ==========================================
  # 4. MESSAGE BROKER (TASK QUEUE) - RABBITMQ
  # ==========================================
  # Mục đích: Giao tiếp bất đồng bộ, đẩy task nặng vào hàng đợi (vd: Gửi email, xử lý ảnh).
  rabbitmq:
    image: rabbitmq:3-management-alpine # Bắt buộc dùng tag 'management' để có giao diện UI trực quan.
    container_name: nexus-rabbitmq
    ports:
      - "5672:5672" # Port chuẩn AMQP để ứng dụng (Spring/Nest) kết nối và gửi/nhận message.
      - "15672:15672" # Port của Dashboard quản lý. Mở trình duyệt gõ localhost:15672 để xem UI.
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    mem_limit: 384mb
    restart: unless-stopped

  # ==========================================
  # 5. EVENT STREAMING - KAFKA (KRaft Mode)
  # ==========================================
  # Mục đích: Pub/Sub luồng sự kiện lớn, nền tảng cho Saga Pattern (Choreography) phân tán Transaction.
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: nexus-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: '4L69Hxv9QXS-9s3X_9vS1g'
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - kafka_data:/var/lib/kafka/data
    mem_limit: 600mb
    restart: unless-stopped

  # ==========================================
  # 6. IDENTITY & ACCESS MANAGEMENT (IAM) - KEYCLOAK
  # ==========================================
  # Mục đích: Giải pháp "chìa khóa trao tay" cho SSO, AuthN và AuthZ (OpenID Connect / OAuth2).
  # Ứng dụng: Cấp phát Token JWT, thay thế hoàn toàn cho Auth Service tự build.
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: nexus-keycloak
    ports:
      - "8081:8080" # Giao diện quản trị Admin Console sẽ chạy ở cổng 8081 (Đề phòng cổng 8080 trùng với API Gateway)
    environment:
      KEYCLOAK_ADMIN: admin # Tài khoản đăng nhập trang quản trị
      KEYCLOAK_ADMIN_PASSWORD: admin # Mật khẩu truy cập
      # Keycloak mặc định bắt có DB/HTTPS. Start-dev ép cho nó hiểu đang chạy Local Lab (dùng local H2 DB & HTTP thường).
    command: start-dev
    mem_limit: 512mb
    restart: unless-stopped

  # ==========================================
  # 7. SEARCH ENGINE - ELASTICSEARCH (CQRS Read-Side)
  # ==========================================
  # Mục đích: Làm Query database cho cơ chế CQRS, lưu trữ và tìm kiếm đơn hàng tốc độ cao
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.0
    container_name: nexus-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Tắt security để tiện dev local
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m # Hạn chế RAM tránh crash máy
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://127.0.0.1:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    mem_limit: 800mb
    restart: unless-stopped

  # ==========================================
  # 8. ELASTICSEARCH DASHBOARD - KIBANA
  # ==========================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: nexus-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    mem_limit: 400mb
    restart: unless-stopped

  # ==========================================
  # 9. KAFKA CONNECT (CDC Engine)
  # ==========================================
  # Mục đích: Chạy các Connector (Debezium Source, ES Sink) để đồng bộ dữ liệu tự động.
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.7.0
    container_name: nexus-kafka-connect
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: "nexus-connect-cluster"
      CONNECT_CONFIG_STORAGE_TOPIC: "nexus-connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "nexus-connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "nexus-connect-status"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_INTERNAL_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_INTERNAL_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
    volumes:
      - ./scripts/kafka-connect-init.sh:/usr/bin/kafka-connect-init.sh
    command: 
      - /bin/bash
      - /usr/bin/kafka-connect-init.sh
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
      elasticsearch:
        condition: service_started
    mem_limit: 1024mb
    restart: unless-stopped

  # ==========================================
  # 10. CDC PROVISIONER (Auto-configurator)
  # ==========================================
  # Mục đích: Tự động đăng ký các Connector khi Kafka Connect đã sẵn sàng.
  cdc-provisioner:
    image: curlimages/curl:latest
    container_name: nexus-cdc-provisioner
    volumes:
      - ./connectors:/connectors
      - ./scripts/cdc-provisioning.sh:/cdc-provisioning.sh
    depends_on:
      kafka-connect:
        condition: service_healthy
    command:
      - /bin/sh
      - /cdc-provisioning.sh

# ==========================================
# KHAI BÁO VOLUMES (PERSISTENT STORAGE)
# ==========================================
# Nơi Docker đăng ký các vùng nhớ vật lý trên máy host. Bắt buộc phải khai báo nếu bên trên có dùng.
volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  kafka_data:
  elasticsearch_data:
