input {
  tcp {
    port => 50000
    codec => json_lines
  }
}

filter {
  mutate {
    add_field => { "[@metadata][debug]" => "${LOGSTASH_DEBUG:false}" }
  }
  if ![service_name] {
    mutate { add_field => { "service_name" => "unknown" } }
  }
  # Sanitize service_name for indexing
  mutate {
    lowercase => [ "service_name" ]
    gsub => [ "service_name", "[^a-z0-9._-]", "_" ]
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS:http://elasticsearch:9200}"]
    user => "${LOGSTASH_ES_USER:logstash_writer}"
    password => "${LOGSTASH_PASSWORD}"
    index => "nexus-logs-alias"
    ilm_enabled => true
    ilm_rollover_alias => "nexus-logs-alias"
    ilm_pattern => "{now/d}"
    ilm_policy => "nexus-logs-policy"
    # Production TLS: set ELASTICSEARCH_SSL=true và mount CA cert, rồi bỏ comment 2 dòng dưới.
    # ssl => true
    # cacert => "/usr/share/logstash/certs/ca.crt"
  }
  if [@metadata][debug] == "true" {
    stdout { codec => rubydebug }
  }
}
