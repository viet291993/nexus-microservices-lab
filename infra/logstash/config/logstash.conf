input {
  tcp {
    port => 50000
    codec => json_lines
  }
}

filter {
  mutate {
    add_field => { "[@metadata][debug]" => "${LOGSTASH_DEBUG:false}" }
  }
  if ![service_name] {
    mutate { add_field => { "service_name" => "unknown" } }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "${LOGSTASH_ES_USER:logstash_writer}"
    password => "${ELASTIC_PASSWORD}"
    index => "nexus-logs-%{service_name}-%{+YYYY.MM.dd}"
  }
  if [@metadata][debug] == "true" {
    stdout { codec => rubydebug }
  }
}
