global:
  scrape_interval: 15s # Thu thập dữ liệu mỗi 15 giây
  evaluation_interval: 15s # Đánh giá quy tắc mỗi 15 giây

scrape_configs:
  # 1. Tự giám sát Prometheus
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # 2. Giám sát các Microservices qua Spring Boot Actuator
  # Lưu ý: Dùng host.docker.internal để Prometheus (trong container) kết nối được với App (chạy ở ngoài)
  - job_name: "nexus-microservices"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "host.docker.internal:8080" # API Gateway
          - "host.docker.internal:8082" # Order Service
          - "host.docker.internal:8083" # Product Service
          - "host.docker.internal:8761" # Eureka Server
          - "host.docker.internal:8888" # Config Server
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "host.docker.internal:(.*)"
        replacement: "$1"

  # 3. Giám sát Kafka qua Kafka Exporter
  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["kafka-exporter:9308"]
