version: '3.8'

services:
  # Base Infrastructure (Hạ tầng cơ bản không đổi so với compose, thêm deploy logs/restart policy)
  postgres:
    image: postgres:15-alpine
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: nexus_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexus-net
    deploy:
      restart_policy:
        condition: on-failure

  mongodb:
    image: mongo:6.0-jammy
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    networks:
      - nexus-net
    deploy:
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    command: >
      redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis_data:/data
    networks:
      - nexus-net
    deploy:
      restart_policy:
        condition: on-failure

  kafka:
    image: apache/kafka:3.7.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: -Xmx400m -Xms200m
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - nexus-net
    deploy:
      restart_policy:
        condition: on-failure

  # Nexus Business Services (Sử dụng Image từ GHCR)
  # Lưu ý: Sử dụng biến ${IMAGE_TAG:-latest} để đảm bảo tính bất biến (immutable).
  # Trong CD thực tế, IMAGE_TAG sẽ được gán bằng Git SHA (commit hash).
  eureka-server:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/nexus-nexus-eureka-server:${IMAGE_TAG:-latest}
    ports:
      - "8761:8761"
    networks:
      - nexus-net
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure

  config-server:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/nexus-nexus-config-server:${IMAGE_TAG:-latest}
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: native
    networks:
      - nexus-net
    deploy:
      replicas: 1

  api-gateway:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/nexus-nexus-api-gateway:${IMAGE_TAG:-latest}
    ports:
      - "8080:8080"
    networks:
      - nexus-net
    deploy:
      replicas: 2
      update_config:
        order: start-first

  order-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/nexus-nexus-order-service:${IMAGE_TAG:-latest}
    networks:
      - nexus-net
    deploy:
      replicas: 1

  product-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/nexus-nexus-product-service:${IMAGE_TAG:-latest}
    networks:
      - nexus-net
    deploy:
      replicas: 1

  inventory-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/nexus-nexus-inventory-service:${IMAGE_TAG:-latest}
    networks:
      - nexus-net
    deploy:
      replicas: 1

networks:
  nexus-net:
    # Overlay Driver là bắt buộc để các container trên các node khác nhau trong Swarm có thể giao tiếp qua mạng riêng
    driver: overlay

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  kafka_data:
