# ==============================================================================
# NEXUS MICROSERVICES LAB - FULL STACK COMPOSE
# ==============================================================================
# Mục đích: Khởi chạy TOÀN BỘ hệ thống (Hạ tầng + 6 Microservices) bằng 1 lệnh duy nhất.
# Cách dùng: docker-compose -f docker-compose.all.yml up -d --build
# Yêu cầu: RAM >= 16GB
# ==============================================================================

services:
  # ==========================================
  # 1. INFRASTRUCTURE (Backing Services)
  # ==========================================
  
  postgres:
    image: postgres:15-alpine
    container_name: nexus-postgres
    command: ["postgres", "-c", "wal_level=logical"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: nexus_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexus-net
    mem_limit: 256mb
    restart: unless-stopped
    env_file: infra/.env

  mongodb:
    image: mongo:6.0-jammy
    container_name: nexus-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
    volumes:
      - mongodb_data:/data/db
    networks:
      - nexus-net
    mem_limit: 384mb
    restart: unless-stopped
    env_file: infra/.env

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    command: >
      redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nexus-net
    mem_limit: 128mb
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nexus-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:?RABBITMQ_PASS is required}
    networks:
      - nexus-net
    mem_limit: 384mb
    restart: unless-stopped
    env_file: infra/.env

  kafka:
    image: apache/kafka:3.7.1
    container_name: nexus-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_HEAP_OPTS: -Xmx400m -Xms200m
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - nexus-net
    mem_limit: 1024mb
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:9.2.0
    container_name: nexus-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?ELASTIC_PASSWORD is required}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -sf -k -u elastic:$$ELASTIC_PASSWORD http://127.0.0.1:9200/_cluster/health >/dev/null || exit 1"
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - nexus-net
    mem_limit: 1536mb
    restart: unless-stopped
    env_file: infra/.env

  # ==========================================
  # 2. NEXUS BUSINESS MICROSERVICES
  # ==========================================

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: nexus-eureka-server
    ports:
      - "8761:8761"
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 512mb
    restart: unless-stopped

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: nexus-config-server
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=native
      - CONFIG_SERVER_PASSWORD=${CONFIG_SERVER_PASSWORD:?CONFIG_SERVER_PASSWORD is required}
      - CONFIG_SERVER_ENCRYPT_KEY=${CONFIG_SERVER_ENCRYPT_KEY:?CONFIG_SERVER_ENCRYPT_KEY is required}
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - nexus-net
    mem_limit: 512mb
    restart: unless-stopped
    env_file: infra/.env

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: nexus-api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CONFIG_IMPORT=configserver:http://nexus_admin:${CONFIG_SERVER_PASSWORD}@config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      config-server:
        condition: service_started
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - nexus-net
    mem_limit: 512mb
    restart: unless-stopped
    env_file: infra/.env

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: nexus-order-service
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CONFIG_IMPORT=configserver:http://nexus_admin:${CONFIG_SERVER_PASSWORD}@config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      - nexus-net
    mem_limit: 512mb
    restart: unless-stopped
    env_file: infra/.env

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: nexus-product-service
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CONFIG_IMPORT=configserver:http://nexus_admin:${CONFIG_SERVER_PASSWORD}@config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      config-server:
        condition: service_started
    networks:
      - nexus-net
    mem_limit: 512mb
    restart: unless-stopped
    env_file: infra/.env

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    container_name: nexus-inventory-service
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CONFIG_IMPORT=configserver:http://nexus_admin:${CONFIG_SERVER_PASSWORD}@config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      mongodb:
        condition: service_started
      kafka:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      - nexus-net
    mem_limit: 384mb
    restart: unless-stopped
    env_file: infra/.env

  # ==========================================
  # 3. EXTRA TOOLS (Logging, Tracing, Monitoring)
  # ==========================================

  zipkin:
    image: openzipkin/zipkin:3.4
    container_name: nexus-zipkin
    ports:
      - "9411:9411"
    networks:
      - nexus-net
    mem_limit: 300mb
    restart: unless-stopped

  # Ghi chú: Có thể thêm ELK/Prometheus/Grafana vào đây nếu máy cực mạnh.
  # Hiện tại tạm để các Core Services để đảm bảo hiệu năng.

networks:
  nexus-net:
    driver: bridge

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  kafka_data:
  elasticsearch_data:
