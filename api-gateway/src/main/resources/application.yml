server:
  port: 8080

spring:
  application:
    # Trùng với tên file api-gateway.yml chứa cấu hình khổng lồ nằm bên trong thư mục config-repo của máy chủ Config.
    name: api-gateway
  config:
    # Điểm đến nạp cấu hình sống (URL Config Server). Nếu không tìm thấy máy chủ 8888, gateway sẽ bỏ qua (nhờ chữ optional:)
    import: "optional:configserver:http://localhost:8888/"
  cloud:
    config:
      fail-fast: true
      retry:
        initial-interval: 2000
        max-interval: 10000
        max-attempts: 6
      username: ${NEXUS_USERNAME:nexus_admin}
      # Dev: fallback dev_password. Prod: dùng ${CONFIG_SERVER_PASSWORD:?Required} trong application-prod.yml
      password: ${CONFIG_SERVER_PASSWORD:dev_password}
