server:
    port: 8888

spring:
    application:
        name: config-server
    profiles:
        active: native # Dùng thư mục cục bộ (Native) để quản lý cấu hình, phù hợp chạy local
    cloud:
        config:
            server:
                native:
                    # classpath: luôn tìm được đúng vị trí dù mvn chạy từ bất kỳ thư mục nào.
                    search-locations: classpath:/config-repo

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
