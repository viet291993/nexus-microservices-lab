server:
  port: 8082 # Đổi 8081 → 8082 vì Keycloak container đang chiếm port 8081 (docker-compose: 8081:8080)

spring:
  # CẤU HÌNH DATABASE (PostgreSQL)
  datasource:
    url: jdbc:postgresql://localhost:5432/nexus_db # Trỏ tới Data container được dựng bởi docker-compose
    username: nexus_user
    password: nexus_password
  jpa:
    hibernate:
      ddl-auto: update # Tự động scan các Entity class và nạp cấu trúc thành Table/Column trên PostgreSQL.
    show-sql: true # Log script SQL SQL/Query ra màn hình để dễ bắt bug lúc code.

  # CẤU HÌNH KAFKA MESSAGE BROKER (Saga Pattern)
  kafka:
    bootstrap-servers: localhost:9092 # Trỏ tay tới địa chỉ broker Kafka.
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: "order-service-group" # Nhóm người nghe của Order Service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"

# CẤU HÌNH SERVICE DISCOVERY (EUREKA)
eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# BẬT SỨC KHOẺ HOT RELOAD CHO CONFIG SERVER
management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
